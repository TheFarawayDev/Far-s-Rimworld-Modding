name: Release Mods
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Run Release Script
      shell: powershell
      env:
        IS_RELEASE: "true"
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./release-github.ps1
